name: WSL acceptance

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "53 1 * * *"
  push:
    tags:
      - "v*-rc*"

permissions:
  contents: read

jobs:
  wsl2:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - name: Run WSL acceptance suite
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repo = (wsl wslpath -u "$env:GITHUB_WORKSPACE").Trim()
          wsl bash -lc "set -euo pipefail; cd '$repo' && bash .github/scripts/wsl-acceptance.sh"
