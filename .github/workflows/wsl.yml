name: WSL acceptance

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "53 1 * * *"
  push:
    tags:
      - "v*-rc*"

permissions:
  contents: read

jobs:
  wsl2:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - name: Install WSL Ubuntu for acceptance
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $distro = 'Ubuntu-24.04'
          $installed = @(wsl -l -q 2>$null)
          if ($installed -notcontains $distro) {
            wsl --install $distro --no-launch --web-download
          }
          $deadline = (Get-Date).AddMinutes(15)
          do {
            $installed = @(wsl -l -q 2>$null)
            if ($installed -contains $distro) { break }
            Start-Sleep -Seconds 10
          } while ((Get-Date) -lt $deadline)
          if ($installed -notcontains $distro) {
            wsl -l -v
            throw "WSL distribution $distro is not available"
          }
          wsl -d $distro -- bash -lc 'echo WSL ready'
      - name: Run WSL acceptance suite
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $distro = 'Ubuntu-24.04'
          $winPath = $env:GITHUB_WORKSPACE.Replace('\', '/')
          $repo = (wsl -d $distro -- wslpath -u "$winPath").Trim()
          wsl -d $distro bash -lc "set -euo pipefail; cd '$repo' && bash .github/scripts/wsl-acceptance.sh"
