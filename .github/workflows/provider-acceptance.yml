name: Provider acceptance

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Provider or channel to exercise (gemini, codex, claude, vertex, ...)
        required: true
        type: string
      skip_launch:
        description: Skip Claude launch step
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  live-provider:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Gate on repository secrets
        id: gate
        env:
          PMUX_ACCEPTANCE_GEMINI_KEY: ${{ secrets.PMUX_ACCEPTANCE_GEMINI_KEY }}
          PMUX_ACCEPTANCE_API_KEY: ${{ secrets.PMUX_ACCEPTANCE_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${PMUX_ACCEPTANCE_GEMINI_KEY}" && -z "${PMUX_ACCEPTANCE_API_KEY}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No PMUX_ACCEPTANCE_* secrets configured; skipping live provider acceptance."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip without secrets
        if: steps.gate.outputs.skip == 'true'
        run: echo "Skipped (configure PMUX_ACCEPTANCE_GEMINI_KEY or PMUX_ACCEPTANCE_API_KEY to run)."
      - uses: actions/setup-go@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          go-version-file: go.mod
          cache: true
      - name: Build PMux
        if: steps.gate.outputs.skip != 'true'
        run: go build -trimpath -o pmux ./cmd/pmux
      - name: Run provider verification
        if: steps.gate.outputs.skip != 'true'
        env:
          PMUX_ACCEPTANCE_PROVIDER: ${{ inputs.provider }}
          PMUX_ACCEPTANCE_GEMINI_KEY: ${{ secrets.PMUX_ACCEPTANCE_GEMINI_KEY }}
          PMUX_ACCEPTANCE_API_KEY: ${{ secrets.PMUX_ACCEPTANCE_API_KEY }}
        run: |
          set -euo pipefail
          echo "Provider acceptance requires repository secrets and a prepared CLIProxyAPI instance."
          echo "Configure PMUX_ACCEPTANCE_* secrets, then extend this workflow with managed-setup steps."
          ./pmux version
          ./pmux --json doctor || true
